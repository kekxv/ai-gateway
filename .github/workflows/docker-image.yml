name: Release and Publish Docker Image

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Build frontend
      run: |
        cd web
        npm ci
        npm run build

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Install dependencies
      run: go mod download

    - name: Run tests
      run: go test -v ./...

    - name: Run build
      run: CGO_ENABLED=0 GOOS=linux go build -a -o ai-gateway ./cmd/server

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version_check.outputs.version }}
      release_needed: ${{ steps.version_check.outputs.release_needed }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check version
      id: version_check
      run: |
        VERSION=$(cat VERSION)
        echo "version=${VERSION}" >> $GITHUB_OUTPUT

        if git rev-parse "v$VERSION" >/dev/null 2>&1; then
          echo "status=existing" >> $GITHUB_OUTPUT
          echo "release_needed=false" >> $GITHUB_OUTPUT
        else
          echo "status=new" >> $GITHUB_OUTPUT
          echo "release_needed=true" >> $GITHUB_OUTPUT
        fi

    - name: Set up QEMU
      if: steps.version_check.outputs.release_needed == 'true'
      uses: docker/setup-qemu-action@v3
      with:
        platforms: linux/amd64,linux/arm64

    - name: Set up Docker Buildx
      if: steps.version_check.outputs.release_needed == 'true'
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      if: steps.version_check.outputs.release_needed == 'true'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      if: steps.version_check.outputs.release_needed == 'true'
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        platforms: linux/amd64,linux/arm64
        tags: |
          ghcr.io/${{ github.repository }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          VCS_REF=${{ github.sha }}
          VERSION=${{ steps.version_check.outputs.version }}

  release:
    needs: docker-build
    runs-on: ubuntu-latest
    if: needs.docker-build.outputs.release_needed == 'true'
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Create and push Git tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        VERSION="${{ needs.docker-build.outputs.version }}"
        TAG="v${VERSION}"

        echo "Creating tag: $TAG"
        git tag -a "$TAG" -m "Release $TAG" -m "Automated release by GitHub Actions" -m "Built from commit: ${{ github.sha }}" -m "Build number: ${{ github.run_number }}"

        echo "Pushing tag: $TAG"
        git push origin "$TAG"

        echo "✓ Tag created and pushed successfully: $TAG"

    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ needs.docker-build.outputs.version }}
        release_name: Release v${{ needs.docker-build.outputs.version }}
        body: |
          ## Release v${{ needs.docker-build.outputs.version }}

          **Build Details:**
          - Commit: ${{ github.sha }}
          - Build Number: ${{ github.run_number }}
          - Branch: ${{ github.ref }}

          **Tests:** ✓ Passed
          **Build:** ✓ Successful
          **Docker:** ✓ Published

          Docker image available at:
          - `ghcr.io/${{ github.repository }}:v${{ needs.docker-build.outputs.version }}`
          - `ghcr.io/${{ github.repository }}:latest`
          - `ghcr.io/${{ github.repository }}:${{ github.sha }}`
        draft: false
        prerelease: false

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Add version tags to Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        platforms: linux/amd64,linux/arm64
        tags: |
          ghcr.io/${{ github.repository }}:latest
          ghcr.io/${{ github.repository }}:v${{ needs.docker-build.outputs.version }}
        cache-from: type=gha

    - name: Summary
      run: |
        echo "## GitHub Actions Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Release v${{ needs.docker-build.outputs.version }} Published" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Tests | ✓ Passed |" >> $GITHUB_STEP_SUMMARY
        echo "| Build | ✓ Successful |" >> $GITHUB_STEP_SUMMARY
        echo "| Docker | ✓ Published |" >> $GITHUB_STEP_SUMMARY
        echo "| Tag | v${{ needs.docker-build.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Release | ✓ Created |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Docker images:" >> $GITHUB_STEP_SUMMARY
        echo "- \`ghcr.io/${{ github.repository }}:latest\`" >> $GITHUB_STEP_SUMMARY
        echo "- \`ghcr.io/${{ github.repository }}:v${{ needs.docker-build.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- \`ghcr.io/${{ github.repository }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  skip-summary:
    needs: docker-build
    runs-on: ubuntu-latest
    if: needs.docker-build.outputs.release_needed != 'true'
    steps:
    - name: Summary
      run: |
        echo "## GitHub Actions Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### No Release Needed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Tag v${{ needs.docker-build.outputs.version }} already exists, skipping release." >> $GITHUB_STEP_SUMMARY